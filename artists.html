var currentFilter="הכל";function generateArtistsGrid(){var g=document.getElementById("artistsGrid");g.innerHTML="";var f=currentFilter==="הכל"?artistsData:artistsData.filter(function(a){return a.category===currentFilter});f.forEach(function(a,i){var c=document.createElement("div");c.className="artist-card";c.style.animationDelay=(i*0.1)+"s";c.innerHTML='<img src="'+a.img+'" alt="'+a.name+'" class="artist-card-image" loading="lazy"><div class="artist-card-overlay"><div class="artist-card-content"><h3 class="artist-name">'+a.name+'</h3><p class="artist-genre">'+a.genre+'</p><a href="#" class="artist-link">פרטים נוספים \u2192</a></div></div>';g.appendChild(c);setTimeout(function(){c.classList.add("loaded")},50)});observeCards()}function observeCards(){var cards=document.querySelectorAll(".artist-card");var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add("loaded");obs.unobserve(e.target)}})},{threshold:0.1});cards.forEach(function(c){obs.observe(c)})}function setupFilterButtons(){var btns=document.querySelectorAll(".filter-btn");btns.forEach(function(b){b.addEventListener("click",function(){document.querySelectorAll(".filter-btn").forEach(function(x){x.classList.remove("active")});b.classList.add("active");currentFilter=b.getAttribute("data-category");generateArtistsGrid()})})}function setupScrollListener(){var nav=document.querySelector(".navbar");window.addEventListener("scroll",function(){if(window.scrollY>50){nav.classList.add("scrolled")}else{nav.classList.remove("scrolled")}})}setupFilterButtons();generateArtistsGrid();setupScrollListener();
</script>
