            { name: 'עלמה פרידן', genre: 'אינדי-פופ', category: 'פופ', img: 'img/alma.jpg' },
            { name: 'MC קריטיקל', genre: 'היפ-הופ', category: 'ראפ/היפ-הופ', img: 'img/crowd.jpg' },
            { name: 'נועם אלקטרו', genre: 'אלקטרוני / האוס', category: 'אלקטרוני', img: 'img/stage.jpg' },
            { name: 'שחר ברק', genre: 'רוק אלטרנטיבי', category: 'רוק', img: 'img/concert.jpg' }
        ];
        var currentFilter = 'הכל';
        function generateArtistsGrid() {
            var grid = document.getElementById('artistsGrid');
            grid.innerHTML = '';
            var filteredArtists = currentFilter === 'הכל' ? artistsData : artistsData.filter(function(a) { return a.category === currentFilter; });
            filteredArtists.forEach(function(artist, index) {
                var card = document.createElement('div');
                card.className = 'artist-card';
                card.style.animationDelay = (index * 0.1) + 's';
                card.innerHTML = '<img src="' + artist.img + '" alt="' + artist.name + '" class="artist-card-image" loading="lazy"><div class="artist-card-overlay"><div class="artist-card-content"><h3 class="artist-name">' + artist.name + '</h3><p class="artist-genre">' + artist.genre + '</p><a href="#" class="artist-link">פרטים נוספים →</a></div></div>';
                grid.appendChild(card);
                setTimeout(function() { card.classList.add('loaded'); }, 50);
            });
            observeCards();
        }
        function observeCards() {
            var cards = document.querySelectorAll('.artist-card');
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) { if (entry.isIntersecting) { entry.target.classList.add('loaded'); observer.unobserve(entry.target); } });
            }, { threshold: 0.1 });
            cards.forEach(function(card) { observer.observe(card); });
        }
        function setupFilterButtons() {
            var buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
                    btn.classList.add('active');
                    currentFilter = btn.getAttribute('data-category');
                    generateArtistsGrid();
                });
            });
        }
        function setupScrollListener() {
            var navbar = document.querySelector('.navbar');
            window.addEventListener('scroll', function() {
                if (window.scrollY > 50) { navbar.classList.add('scrolled'); } else { navbar.classList.remove('scrolled'); }
            });
        }
        setupFilterButtons();
        generateArtistsGrid();
        setupScrollListener();
    </script>
</body>
</html>
