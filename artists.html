<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אלגוריתם - אמנים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Heebo',sans-serif;background-color:#060810;color:#fff;overflow-x:hidden}
.navbar{position:fixed;top:0;right:0;left:0;height:60px;background:rgba(6,8,16,0);backdrop-filter:blur(0px);z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 40px;transition:all .3s ease}
.navbar.scrolled{background:rgba(6,8,16,.95);backdrop-filter:blur(10px);box-shadow:0 4px 30px rgba(0,0,0,.3)}
.navbar-logo{font-size:24px;font-weight:700;letter-spacing:1px;background:linear-gradient(135deg,#00b8e6 0%,#00d4ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.navbar-back{text-decoration:none;color:#00b8e6;font-size:14px;font-weight:500;transition:all .3s ease;display:flex;align-items:center;gap:8px}
.navbar-back:hover{color:#00d4ff;transform:translateX(4px)}
.hero{width:100vw;height:50vh;margin-top:60px;background:linear-gradient(180deg,#0a1628 0%,#060810 40%,#0a0f1a 100%);position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.hero::before{content:'';position:absolute;bottom:-1px;left:0;right:0;height:300px;background:radial-gradient(ellipse at center bottom,rgba(0,184,230,.15) 0%,transparent 70%);pointer-events:none}
.hero-content{position:relative;z-index:2;animation:fadeInUp .8s ease-out}
.hero-title{font-size:64px;font-weight:800;margin-bottom:20px;background:linear-gradient(135deg,#fff 0%,#00d4ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px;line-height:1.1}
.hero-subtitle{font-size:18px;font-weight:300;color:#a0a8c0;max-width:600px;line-height:1.6;animation:fadeInUp .8s ease-out .2s both}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.filter-bar{position:sticky;top:60px;background:rgba(6,8,16,.98);backdrop-filter:blur(10px);padding:20px 40px;z-index:90;border-bottom:1px solid rgba(0,184,230,.1);overflow-x:auto;overflow-y:hidden;scroll-behavior:smooth}
.filter-container{display:flex;gap:12px;min-width:fit-content;justify-content:flex-end}
.filter-btn{padding:10px 20px;border:2px solid rgba(0,184,230,.4);background:transparent;color:#a0a8c0;border-radius:24px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:14px;font-weight:500;white-space:nowrap;transition:all .3s ease}
.filter-btn:hover{border-color:#00b8e6;color:#00b8e6}
.filter-btn.active{background:#00b8e6;border-color:#00b8e6;color:#060810;box-shadow:0 0 20px rgba(0,184,230,.4)}
.gallery-section{max-width:1200px;margin:60px auto;padding:0 40px}
.artists-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}

/* ===== Artist cube cards ===== */
.artist-card{position:relative;aspect-ratio:1/1;border-radius:16px;overflow:hidden;cursor:pointer;
  background:linear-gradient(145deg,#0c1424 0%,#070b14 100%);
  border:1px solid rgba(0,200,255,.22);
  box-shadow:0 8px 40px rgba(0,0,0,.5),inset 0 0 30px rgba(0,120,180,.06);
  transition:transform .4s ease,box-shadow .4s ease,border-color .4s ease;
  opacity:0;transform:translateY(30px) scale(.98)}
.artist-card.loaded{animation:cardFadeIn .6s ease-out forwards}
@keyframes cardFadeIn{to{opacity:1;transform:translateY(0) scale(1)}}
.artist-card:hover{transform:translateY(-6px) scale(1.02);border-color:rgba(0,210,255,.6);
  box-shadow:0 18px 60px rgba(0,140,200,.35),inset 0 0 40px rgba(0,140,200,.12)}
/* corner brackets (cube HUD look) */
.artist-card::before,.artist-card::after{content:'';position:absolute;width:26px;height:26px;z-index:8;pointer-events:none;transition:all .4s ease}
.artist-card::before{top:12px;right:12px;border-top:2px solid rgba(0,210,255,.55);border-right:2px solid rgba(0,210,255,.55)}
.artist-card::after{bottom:12px;left:12px;border-bottom:2px solid rgba(0,210,255,.55);border-left:2px solid rgba(0,210,255,.55)}
.artist-card:hover::before{top:8px;right:8px;border-color:#33d4ff}
.artist-card:hover::after{bottom:8px;left:8px;border-color:#33d4ff}

.artist-card-image{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .5s ease;z-index:3}
.artist-card:hover .artist-card-image{transform:scale(1.08)}
.artist-card-image.img-missing{display:none}

/* empty-cube placeholder, shown until a real image is dropped in /images */
.cube-placeholder{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:
    radial-gradient(ellipse at 50% 35%,rgba(0,150,210,.16),transparent 60%),
    repeating-linear-gradient(0deg,rgba(0,180,240,.05) 0,rgba(0,180,240,.05) 1px,transparent 1px,transparent 33.33%),
    repeating-linear-gradient(90deg,rgba(0,180,240,.05) 0,rgba(0,180,240,.05) 1px,transparent 1px,transparent 33.33%);
  text-align:center;padding:16px}
.cube-ico{width:54px;height:54px;filter:drop-shadow(0 0 10px rgba(0,200,255,.5));opacity:.9;transition:transform .5s ease}
.artist-card:hover .cube-ico{transform:rotate(8deg) scale(1.08)}
.ph-name{font-family:'Rubik',sans-serif;font-weight:700;font-size:20px;color:#cfeffb;text-shadow:0 0 12px rgba(0,200,255,.35);letter-spacing:.5px;line-height:1.25}
.ph-hint{font-size:11px;color:#5d7187;letter-spacing:2px;text-transform:uppercase}

.artist-card-overlay{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;justify-content:flex-end;padding:22px;
  background:linear-gradient(180deg,transparent 0%,rgba(0,0,0,.15) 45%,rgba(0,0,0,.88) 100%);
  opacity:0;transition:opacity .4s ease}
/* overlay only matters once a real image exists; show it on hover */
.artist-card:hover .artist-card-overlay{opacity:1}
.artist-card-content{position:relative;z-index:6}
.artist-name{font-size:22px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.2;text-shadow:0 2px 10px rgba(0,0,0,.6)}
.artist-genre{font-size:12px;color:#33d4ff;font-weight:500;letter-spacing:.5px}

.footer{background:#0a0f1a;border-top:1px solid rgba(0,184,230,.1);padding:40px;text-align:center;margin-top:80px}
.footer-content{max-width:1200px;margin:0 auto}
.footer-text{font-size:13px;color:#6b7280;margin-bottom:20px;font-weight:300}
.footer-social{display:flex;gap:20px;justify-content:center;align-items:center}
.social-link{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;background:rgba(0,184,230,.1);color:#00b8e6;text-decoration:none;transition:all .3s ease}
.social-link:hover{background:rgba(0,184,230,.25);color:#00d4ff;transform:translateY(-3px)}
.social-link svg{width:18px;height:18px;fill:currentColor}
@media(max-width:1024px){.artists-grid{grid-template-columns:repeat(2,1fr);gap:22px}.navbar{padding:0 24px}.filter-bar{padding:16px 24px}.hero-title{font-size:48px}.hero-subtitle{font-size:16px}}
@media(max-width:768px){.artists-grid{grid-template-columns:1fr;gap:18px}.gallery-section{padding:0 20px}.navbar{padding:0 16px}.navbar-logo{font-size:18px}.filter-bar{padding:12px 16px}.filter-container{justify-content:flex-start}.hero{height:40vh}.hero-title{font-size:36px}.hero-subtitle{font-size:14px}}
@media(max-width:480px){.hero{height:35vh}.hero-title{font-size:28px}.hero-subtitle{font-size:12px}.ph-name{font-size:17px}.gallery-section{margin:40px auto}.navbar-logo{font-size:16px}.navbar-back{font-size:12px}.footer-text{font-size:11px}}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,184,230,.3);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:rgba(0,184,230,.6)}
</style>
</head>
<body>
<nav class="navbar"><span class="navbar-logo">אלגוריתם</span><a href="index.html" class="navbar-back">← חזרה</a></nav>
<section class="hero"><div class="hero-content"><h1 class="hero-title">האמנים שלנו</h1><p class="hero-subtitle">ניהול, ייצוג והפקה לאמנים המובילים בישראל</p></div></section>
<div class="filter-bar"><div class="filter-container"><button class="filter-btn active" data-category="הכל">הכל</button></div></div>
<section class="gallery-section"><div class="artists-grid" id="artistsGrid"></div></section>
<footer class="footer"><div class="footer-content"><p class="footer-text">© 2026 אלגוריתם — ניהול אמנים · הפקות · שיווק</p><div class="footer-social"><a href="#" class="social-link" title="Instagram"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zM5.838 12a6.162 6.162 0 1 1 12.324 0 6.162 6.162 0 0 1-12.324 0zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm4.965-10.322a1.44 1.44 0 1 1 2.881.001 1.44 1.44 0 0 1-2.881-.001z"/></svg></a><a href="#" class="social-link" title="YouTube"><svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg></a><a href="#" class="social-link" title="Facebook"><svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg></a></div></div></footer>
<script>
/* ===========================================================
   רשימת האמנים. כשתפיל תמונה לתיקיית images/ עם שם הקובץ שמופיע
   בשדה img, היא תופיע אוטומטית במקום קוביית-הפלייסהולדר.
   אפשר להוסיף בעתיד genre + category ולהחזיר את כפתורי הסינון.
   =========================================================== */
var artistsData=[
  {name:"ג׳ימבו ג׳יי",genre:"",category:"מוזיקאים",img:"images/jimbo-jay.jpg"},
  {name:"אקו",genre:"",category:"מוזיקאים",img:"images/eko.jpg"},
  {name:"מאור אשכנזי",genre:"",category:"מוזיקאים",img:"images/maor-ashkenazi.jpg"},
  {name:"אוריאל צארום",genre:"",category:"מוזיקאים",img:"images/uriel-tzarum.jpg"},
  {name:"דניאל רובין",genre:"",category:"מוזיקאים",img:"images/daniel-rubin.jpg"},
  {name:"yuz",genre:"",category:"מוזיקאים",img:"images/yuz.jpg"},
  {name:"תזמורת הרחוב הירושלמית",genre:"",category:"מוזיקאים",img:"images/jerusalem-street-orchestra.jpg"}
];

var CUBE_ICO='<svg class="cube-ico" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><g fill="none" stroke="#33d4ff" stroke-width="2.5" stroke-linejoin="round"><path d="M50 8 L86 28 L86 72 L50 92 L14 72 L14 28 Z"/><path d="M50 8 L50 50 M50 50 L86 28 M50 50 L14 28" stroke="rgba(51,212,255,.5)"/><path d="M50 50 L50 92" stroke="rgba(51,212,255,.5)"/></g></svg>';

var currentFilter="הכל";
function generateArtistsGrid(){
  var g=document.getElementById("artistsGrid");g.innerHTML="";
  var f=currentFilter==="הכל"?artistsData:artistsData.filter(function(a){return a.category===currentFilter});
  f.forEach(function(a,i){
    var c=document.createElement("div");
    c.className="artist-card";c.style.animationDelay=(i*0.08)+"s";
    c.innerHTML=
      '<div class="cube-placeholder">'+CUBE_ICO+
        '<span class="ph-name">'+a.name+'</span>'+
        '<span class="ph-hint">תמונה בקרוב</span>'+
      '</div>'+
      '<img src="'+a.img+'" alt="'+a.name+'" class="artist-card-image" loading="lazy" onerror="this.classList.add(\'img-missing\')">'+
      '<div class="artist-card-overlay"><div class="artist-card-content">'+
        '<h3 class="artist-name">'+a.name+'</h3>'+
        (a.genre?'<p class="artist-genre">'+a.genre+'</p>':'')+
      '</div></div>';
    g.appendChild(c);
  });
  observeCards();
}
function observeCards(){
  var cards=document.querySelectorAll(".artist-card");
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add("loaded");obs.unobserve(e.target)}})
  },{threshold:0.1});
  cards.forEach(function(c){obs.observe(c)});
}
function setupFilterButtons(){
  var btns=document.querySelectorAll(".filter-btn");
  btns.forEach(function(b){b.addEventListener("click",function(){
    document.querySelectorAll(".filter-btn").forEach(function(x){x.classList.remove("active")});
    b.classList.add("active");currentFilter=b.getAttribute("data-category");generateArtistsGrid();
  })});
}
function setupScrollListener(){
  var nav=document.querySelector(".navbar");
  window.addEventListener("scroll",function(){if(window.scrollY>50){nav.classList.add("scrolled")}else{nav.classList.remove("scrolled")}});
}
setupFilterButtons();generateArtistsGrid();setupScrollListener();
</script>
</body>
</html>
