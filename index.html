<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<title>אלגוריתם | ALGORITHM</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000;
  --accent:#00b8e6;
  --accent2:#0088b8;
  --accent-light:#33d4ff;
}
html,body{height:100%}
body{
  font-family:'Heebo',sans-serif;
  background:var(--bg);
  overflow:hidden;
  height:100vh;width:100vw;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}

/* ---- scene ---- */
.stage{
  position:relative;z-index:2;
  height:100vh;width:100vw;
  display:flex;align-items:center;justify-content:center;
  perspective:2200px;
  perspective-origin:50% 50%;
}
.scene{
  position:relative;
  width:0;height:0;
  transform-style:preserve-3d;
  opacity:0;
  animation:enter 1.2s cubic-bezier(.16,1,.3,1) .15s forwards;
}
@keyframes enter{
  from{opacity:0;transform:scale(.55) translateY(60px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
.assembly{
  position:absolute;left:0;top:0;
  width:0;height:0;
  transform-style:preserve-3d;
}

/* ---- cubelets ---- */
.cubelet{
  position:absolute;
  width:var(--s);height:var(--s);
  left:calc(var(--s) / -2);
  top:calc(var(--s) / -2);
  transform-style:preserve-3d;
  will-change:transform;
}
.face{
  position:absolute;inset:0;
  /* glowing glass tile — bright cyan core fading to deeper blue at the edges */
  background:
    radial-gradient(130% 130% at 32% 26%, rgba(255,255,255,.75) 0%, rgba(255,255,255,0) 52%),
    linear-gradient(135deg,
      hsl(188 90% 78%) 0%,
      hsl(196 85% 64%) 45%,
      hsl(204 80% 52%) 75%,
      hsl(210 75% 42%) 100%);
  /* dark seams like the reference */
  border:1px solid rgba(3,12,24,.85);
  border-radius:6%;
  box-shadow:
    inset 0 0 12px rgba(255,255,255,.28),
    inset 0 -6px 14px rgba(10,50,90,.35),
    0 0 20px rgba(90,205,255,.22);
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
}
/* soft gloss sweep */
.face::before{
  content:'';position:absolute;inset:0;border-radius:6%;
  background:linear-gradient(118deg,
    transparent 30%,
    rgba(255,255,255,.22) 46%,
    rgba(255,255,255,.08) 54%,
    transparent 68%);
  pointer-events:none;
}
/* gentle edge vignette to round the light like glass */
.face::after{
  content:'';position:absolute;inset:0;border-radius:6%;
  background:radial-gradient(115% 115% at 50% 45%, transparent 62%, rgba(8,40,80,.28) 100%);
  pointer-events:none;
}
/* directional light: top nearly white-cyan, bottom deep blue */
.face.f{transform:translateZ(calc(var(--s)/2));filter:brightness(1.05)}
.face.b{transform:rotateY(180deg) translateZ(calc(var(--s)/2));filter:brightness(.62) saturate(1.1)}
.face.r{transform:rotateY(90deg) translateZ(calc(var(--s)/2));filter:brightness(.85) saturate(1.08)}
.face.l{transform:rotateY(-90deg) translateZ(calc(var(--s)/2));filter:brightness(.74) saturate(1.1)}
.face.u{transform:rotateX(90deg) translateZ(calc(var(--s)/2));filter:brightness(1.32)}
.face.d{transform:rotateX(-90deg) translateZ(calc(var(--s)/2));filter:brightness(.5) saturate(1.15)}

/* floor reflection glow */
.floor{
  position:fixed;left:50%;top:50%;z-index:0;pointer-events:none;
  width:70vmin;height:16vmin;
  transform:translate(-50%,26vmin);
  background:radial-gradient(ellipse at center,rgba(0,170,230,.14),transparent 65%);
  filter:blur(6px);
  transition:opacity .9s ease,transform .9s ease;
}
body.is-open .floor{opacity:.45;transform:translate(-50%,26vmin) scale(1.6,1)}

/* ---- logo wordmark ---- */
.wordmark{
  position:fixed;left:50%;top:50%;z-index:3;
  transform:translate(-50%,24vmin);
  direction:ltr;
  pointer-events:none;
  font-family:'Baloo 2',sans-serif;
  font-weight:800;
  font-size:clamp(34px, 7vmin, 68px);
  letter-spacing:.01em;
  line-height:1;
  white-space:nowrap;
  color:#fff;
  -webkit-text-stroke:1.5px rgba(40,24,90,.85);
  text-shadow:
    0 0 14px rgba(41,196,236,.5),
    0 0 36px rgba(30,122,224,.35),
    0 2px 0 rgba(16,8,52,.6);
  animation:wm-breathe 3.5s ease-in-out infinite alternate;
  transition:opacity .6s ease;
}
@keyframes wm-breathe{
  from{
    text-shadow:
      0 0 14px rgba(41,196,236,.5),
      0 0 36px rgba(30,122,224,.35),
      0 2px 0 rgba(16,8,52,.6);
  }
  to{
    text-shadow:
      0 0 24px rgba(41,196,236,.75),
      0 0 54px rgba(30,122,224,.5),
      0 2px 0 rgba(16,8,52,.6);
  }
}
body.is-open .wordmark{opacity:.25}
</style>
</head>
<body>

<div class="floor"></div>

<div class="stage">
  <div class="scene" id="scene">
    <div class="assembly" id="assembly"></div>
  </div>
</div>

<div class="wordmark" aria-hidden="true">Λlgorithm</div>

<script>
(function(){
"use strict";

/* ================= build ================= */
var assembly = document.getElementById('assembly');
var S = 0;                 // cubelet size px
var GAP = 1.04;            // closed spacing multiplier
var cubelets = [];         // {el, gx, gy, gz}

function cssSize(){
  var vm = Math.min(innerWidth, innerHeight);
  S = Math.max(46, Math.round(vm * 0.115));
  document.documentElement.style.setProperty('--s', S + 'px');
}
cssSize();

for (var x=-1; x<=1; x++)
for (var y=-1; y<=1; y++)
for (var z=-1; z<=1; z++){
  var el = document.createElement('div');
  el.className = 'cubelet';
  el.innerHTML = '<div class="face f"></div><div class="face b"></div><div class="face r"></div><div class="face l"></div><div class="face u"></div><div class="face d"></div>';
  assembly.appendChild(el);
  cubelets.push({el:el, gx:x, gy:y, gz:z});
}

/* ================= transforms ================= */
function setT(c, x, y, z, rx, ry, rz, sc, dur, delay, ease){
  c.el.style.transition = 'transform ' + dur + 'ms ' + ease + ' ' + delay + 'ms';
  c.el.style.transform =
    'translate3d(' + x + 'px,' + y + 'px,' + z + 'px)' +
    ' rotateX(' + rx + 'deg) rotateY(' + ry + 'deg) rotateZ(' + rz + 'deg)' +
    ' scale(' + (sc == null ? 1 : sc) + ')';
}
function home(c, dur, delay, ease){
  setT(c, c.gx*S*GAP, c.gy*S*GAP, c.gz*S*GAP, 0, 0, 0, 1, dur, delay, ease);
}
function snapHome(){
  cubelets.forEach(function(c){ home(c, 0, 0, 'linear'); });
}
snapHome();

/* ================= idle spin =================
   rigid rotation on BOTH axes (tumble) — rotation alone never skews the cube;
   a gentle vertical float adds life. */
var rotX = -16, rotY = 32;
var baseSpeedY = 0.22, baseSpeedX = 0.085, boost = 0;
var t0 = null;
function tick(ts){
  if (t0 === null) t0 = ts;
  var dt = Math.min(50, ts - t0); t0 = ts;
  boost *= Math.pow(0.985, dt/16.7);
  rotY += (baseSpeedY + boost) * dt/16.7;
  rotX += (baseSpeedX + boost*0.35) * dt/16.7;
  var bob = Math.sin(ts/1900) * 7;
  assembly.style.transform = 'translate3d(0,' + bob.toFixed(2) + 'px,0) rotateX(' + rotX.toFixed(3) + 'deg) rotateY(' + rotY.toFixed(3) + 'deg)';
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* ================= helpers ================= */
function rnd(a,b){ return a + Math.random()*(b-a); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
var EASES = [
  'cubic-bezier(.16,1,.3,1)',        /* expo out */
  'cubic-bezier(.34,1.56,.64,1)',    /* overshoot */
  'cubic-bezier(.22,1.4,.36,1)',     /* springy */
  'cubic-bezier(.65,0,.35,1)'        /* smooth in-out */
];
var ORDERS = {
  radial: function(c){ return (Math.abs(c.gx)+Math.abs(c.gy)+Math.abs(c.gz)) * 70; },
  random: function(){ return Math.random()*380; },
  byLayer: function(c){ return (c.gy+1) * 130 + Math.random()*60; },
  spiral: function(c,i){ return i * 16; }
};

/* ================= open patterns ================= */
var PATTERNS = [

  /* supernova — radial explosion with wild spin */
  function(){
    var R = rnd(2.6, 3.9), ease = pick(EASES), ord = pick([ORDERS.radial, ORDERS.random]);
    cubelets.forEach(function(c,i){
      var m = (c.gx||c.gy||c.gz) ? R : rnd(0.2,0.6);
      var jx = rnd(-.4,.4), jy = rnd(-.4,.4), jz = rnd(-.4,.4);
      setT(c, (c.gx*m+jx)*S, (c.gy*m+jy)*S, (c.gz*m+jz)*S,
        rnd(-360,360), rnd(-360,360), rnd(-360,360),
        rnd(.85,1.1), rnd(750,1050), ord(c,i), ease);
    });
    return 1450;
  },

  /* galaxy — cubelets scatter onto a rotating sphere shell */
  function(){
    var R = rnd(2.7, 3.6) * S, ease = pick(EASES);
    cubelets.forEach(function(c,i){
      var phi = Math.acos(1 - 2*(i+.5)/27);
      var th = Math.PI * (1 + Math.sqrt(5)) * i + rnd(-.2,.2);
      setT(c, R*Math.sin(phi)*Math.cos(th), R*Math.cos(phi)*0.8, R*Math.sin(phi)*Math.sin(th),
        rnd(-180,180), rnd(-180,180), rnd(-90,90),
        rnd(.8,1), rnd(800,1100), i*22, ease);
    });
    return 1500;
  },

  /* helix — double spiral column */
  function(){
    var ease = pick(EASES), R = rnd(1.9,2.6)*S, H = rnd(4.6,6)*S;
    cubelets.forEach(function(c,i){
      var t = i/26, arm = i%2 ? 0 : Math.PI;
      var a = t * Math.PI * rnd(3.4,4.2) + arm;
      setT(c, R*Math.cos(a), (t-.5)*H, R*Math.sin(a),
        0, -a*180/Math.PI, rnd(-30,30),
        rnd(.85,1), rnd(850,1150), i*26, ease);
    });
    return 1650;
  },

  /* wall — flatten into a floating 9x3 grid facing the camera */
  function(){
    var ease = pick(EASES), gap = rnd(1.25,1.5);
    var shuffled = cubelets.slice().sort(function(){return Math.random()-.5;});
    shuffled.forEach(function(c,i){
      var col = i%9 - 4, row = Math.floor(i/9) - 1;
      setT(c, col*S*gap, row*S*gap, rnd(-.3,.3)*S,
        0, rnd(-14,14), rnd(-10,10),
        rnd(.9,1), rnd(800,1050), ORDERS.random(), ease);
    });
    return 1450;
  },

  /* tornado — swirling vortex, wider at the top */
  function(){
    var ease = pick(EASES);
    cubelets.forEach(function(c,i){
      var t = i/26;
      var y = (t-.5) * rnd(4.6,5.6) * S;
      var R = (0.9 + t*rnd(1.8,2.6)) * S;
      var a = t*Math.PI*rnd(4,6) + rnd(0,Math.PI*2/9)*(i%9);
      setT(c, R*Math.cos(a), y, R*Math.sin(a),
        rnd(-40,40), rnd(-540,540), rnd(-40,40),
        rnd(.8,1.05), rnd(900,1200), ORDERS.byLayer(c), ease);
    });
    return 1700;
  },

  /* shatter — chaotic debris field */
  function(){
    var ease = pick(EASES), R = rnd(2.2,3.4);
    cubelets.forEach(function(c,i){
      setT(c, rnd(-R,R)*S, rnd(-R,R)*S, rnd(-R,R)*S,
        rnd(-720,720), rnd(-720,720), rnd(-720,720),
        rnd(.6,1.15), rnd(700,1200), ORDERS.random(), ease);
    });
    return 1550;
  },

  /* ring — one great glowing ring */
  function(){
    var ease = pick(EASES), R = rnd(3,3.8)*S, tilt = rnd(-24,24);
    cubelets.forEach(function(c,i){
      var a = i/27 * Math.PI*2;
      var x = R*Math.cos(a), z = R*Math.sin(a);
      var y = Math.sin(a*2) * rnd(0,0.7) * S;
      setT(c, x, y + x*Math.tan(tilt*Math.PI/180)*0.28, z,
        rnd(-90,90), -a*180/Math.PI, tilt,
        rnd(.85,1), rnd(850,1150), ORDERS.spiral(c,i), ease);
    });
    return 1600;
  },

  /* fountain — layers leap apart vertically and fan out */
  function(){
    var ease = pick(EASES), spread = rnd(1.6,2.4), lift = rnd(2.2,3.2);
    cubelets.forEach(function(c,i){
      var dir = c.gy === 0 ? rnd(-.5,.5) : c.gy;
      setT(c, c.gx*S*spread + rnd(-.2,.2)*S,
             dir*S*lift + rnd(-.25,.25)*S,
             c.gz*S*spread + rnd(-.2,.2)*S,
        rnd(-200,200)*c.gy, rnd(-180,180), rnd(-200,200)*c.gx,
        1, rnd(800,1100), ORDERS.byLayer(c), ease);
    });
    return 1500;
  }
];

/* ================= close styles ================= */
var CLOSERS = [
  function(){ /* implode — all rush home together */
    var ease = pick(EASES);
    cubelets.forEach(function(c){ home(c, rnd(650,900), rnd(0,120), ease); });
    return 1150;
  },
  function(){ /* zipper — layer by layer */
    var ease = pick(EASES);
    cubelets.forEach(function(c){ home(c, rnd(600,850), ORDERS.byLayer(c), ease); });
    return 1350;
  },
  function(){ /* vacuum — farthest first, springy landing */
    cubelets.forEach(function(c,i){
      home(c, rnd(700,950), 300 - ORDERS.radial(c), 'cubic-bezier(.34,1.56,.64,1)');
    });
    return 1400;
  },
  function(){ /* trickle — random rain back into place */
    cubelets.forEach(function(c){ home(c, rnd(550,800), Math.random()*420, pick(EASES)); });
    return 1450;
  }
];

/* ================= toggle ================= */
var open = false, busy = false, lastPattern = -1;

function toggle(){
  if (busy) return;
  busy = true;
  boost += rnd(2.2, 4.5) * (Math.random() < .5 ? 1 : -.7); /* camera spin kick */
  var wait;
  if (!open){
    var idx;
    do { idx = Math.floor(Math.random()*PATTERNS.length); } while (idx === lastPattern);
    lastPattern = idx;
    wait = PATTERNS[idx]();
    document.body.classList.add('is-open');
  } else {
    wait = pick(CLOSERS)();
    document.body.classList.remove('is-open');
  }
  open = !open;
  setTimeout(function(){ busy = false; }, wait);
}

document.addEventListener('pointerdown', toggle);
document.addEventListener('keydown', function(e){
  if (e.key === ' ' || e.key === 'Enter') toggle();
});

/* ================= resize ================= */
addEventListener('resize', function(){
  cssSize();
  if (!open && !busy) snapHome();
});

})();
</script>
</body>
</html>
