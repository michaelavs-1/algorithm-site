<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=Rubik:wght@300;400;500;600;700;800;900&family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">
<title>אלגוריתם | ניהול אמנים · הפקות · שיווק</title>
<style>

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060810;
  --accent:#00b8e6;--accent2:#0088b8;--accent-light:#33d4ff;
  --border2:rgba(0,180,240,.15);
}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:#e4eaf0;overflow:hidden;direction:rtl;height:100vh;width:100vw;margin:0}
::selection{background:rgba(0,184,230,.2);color:#fff}
a{text-decoration:none}

.hub{
  height:100vh;width:100vw;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}

.hub-grid{
  position:absolute;inset:0;
  overflow:hidden;
}
.hub-grid canvas{
  position:absolute;inset:0;width:100%;height:100%;
}

.hub::before{
  content:'';position:absolute;inset:0;z-index:1;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E");
  pointer-events:none;
}

.hub-center{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
}

/* Cube */
.cube-wrap{
  perspective:1200px;
  width:360px;height:360px;
  display:flex;align-items:center;justify-content:center;
  opacity:0;animation:fadeUp .8s ease .1s forwards;
}
.cube-root{
  width:0;height:0;
  transform-style:preserve-3d;
  animation:cubeSpin 20s linear infinite;
}
@keyframes cubeSpin{
  0%{transform:rotateX(-35deg) rotateY(0deg)}
  100%{transform:rotateX(-35deg) rotateY(360deg)}
}
.cube-glow{
  width:200px;height:18px;margin:0.8rem auto 0;
  background:radial-gradient(ellipse,rgba(0,184,230,.12),transparent 70%);
  border-radius:50%;
  opacity:0;animation:fadeUp .8s ease .3s forwards,cubePulse 4s ease-in-out infinite;
}
@keyframes cubePulse{0%,100%{transform:scale(1);opacity:.35}50%{transform:scale(1.1);opacity:.6}}

.hub-hero-link{
  text-decoration:none;display:flex;flex-direction:column;align-items:center;
  cursor:default;transition:transform .3s;
}
.hub-hero-link:hover{transform:scale(1.03)}

/* Orbiting links */
.float-link{
  position:absolute;z-index:10;
  top:0;left:0;
  text-decoration:none;
  display:flex;align-items:center;justify-content:center;
  cursor:default;
  opacity:0;
  transition:filter .3s;
  will-change:transform;
}
.float-link.visible{opacity:1}
.float-link:hover .float-label{
  background:linear-gradient(180deg,#88ffff,#33eeff,#00ccee);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}

.float-label{
  font-family:'Amatic SC','Rubik',cursive;
  font-weight:900;
  font-size:3.4rem;
  white-space:nowrap;
  letter-spacing:1.5px;
  color:#00b8e6;
  -webkit-text-stroke:1.5px #000;
  paint-order:stroke fill;
  background:linear-gradient(180deg,#66f5ff 0%,#00d4ff 25%,#0099dd 50%,#0066aa 75%,#003d66 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 3px rgba(0,0,0,.8));
  transition:all .3s;
}

/* Decorative */
.scatter-dot{position:absolute;z-index:1;border-radius:50%;opacity:0}
.scatter-dot--1{width:3px;height:3px;background:var(--accent);top:15%;left:25%;animation:dotPulse 4s ease-in-out 1s infinite}
.scatter-dot--2{width:2px;height:2px;background:var(--accent2);top:35%;right:8%;animation:dotPulse 5s ease-in-out 2s infinite}
.scatter-dot--3{width:4px;height:4px;background:#004466;bottom:35%;left:15%;animation:dotPulse 6s ease-in-out .5s infinite}
.scatter-dot--4{width:2px;height:2px;background:var(--accent-light);bottom:12%;left:35%;animation:dotPulse 4.5s ease-in-out 1.5s infinite}
.scatter-dot--5{width:3px;height:3px;background:var(--accent2);top:60%;right:22%;animation:dotPulse 5.5s ease-in-out 3s infinite}
.scatter-line{position:absolute;z-index:1;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);opacity:0}
.scatter-line--1{width:120px;top:30%;left:5%;transform:rotate(-12deg);animation:lineFade 6s ease-in-out 1.2s infinite}
.scatter-line--2{width:80px;bottom:40%;right:6%;transform:rotate(8deg);animation:lineFade 7s ease-in-out 2s infinite}
.scatter-line--3{width:60px;top:65%;left:30%;transform:rotate(-5deg);animation:lineFade 5s ease-in-out 3s infinite}

@keyframes dotPulse{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:.4;transform:scale(1)}}
@keyframes lineFade{0%,100%{opacity:0}40%,60%{opacity:.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:768px){
  .hub{overflow:visible}
  .cube-wrap{width:200px;height:200px;margin:0 auto}
  .hub-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
  .float-label{
    font-size:1.5rem;
    color:#00b8e6 !important;
    -webkit-text-fill-color:#00b8e6 !important;
    background:none !important;
    -webkit-text-stroke:0;
    filter:none !important;
  }
}
</style>
</head>
<body>

<div class="hub">
  <div class="hub-grid"><canvas id="gridCanvas"></canvas></div>
  <div class="scatter-dot scatter-dot--1"></div>
  <div class="scatter-dot scatter-dot--2"></div>
  <div class="scatter-dot scatter-dot--3"></div>
  <div class="scatter-dot scatter-dot--4"></div>
  <div class="scatter-dot scatter-dot--5"></div>
  <div class="scatter-line scatter-line--1"></div>
  <div class="scatter-line scatter-line--2"></div>
  <div class="scatter-line scatter-line--3"></div>

  <div class="hub-center">
    <a href="index.html" class="hub-hero-link">
      <div class="cube-wrap"><div class="cube-root" id="cubeRoot"></div></div>
      <div class="cube-glow"></div>
    </a>
  </div>

  <a class="float-link" id="orb0"><div class="float-label">אומנים</div></a>
  <a class="float-link" id="orb1"><div class="float-label">הפקות</div></a>
  <a class="float-link" id="orb2"><div class="float-label">שיווק</div></a>
  <a class="float-link" id="orb3"><div class="float-label">בוקינג</div></a>
</div>

(function(){

    px:['#00bbee','#0099dd','#0077aa'],  // right: medium blue
    nx:['#0088aa','#006699','#004d77'],  // left: teal

  }
  function rv(m,v){return[m[0][0]*v[0]+m[0][1]*v[1]+m[0][2]*v[2],m[1][0]*v[0]+m[1][1]*v[1]+m[1][2]*v[2],m[2][0]*v[0]+m[2][1]*v[1]+m[2][2]*v[2]];}

    if(ax===1)return[[c,0,s],[0,1,0],[-s,0,c]];
    return[[c,-s,0],[s,c,0],[0,0,1]];
  }

    return'matrix3d('+rot[0][0]+','+rot[1][0]+','+rot[2][0]+',0,'+rot[0][1]+','+rot[1][1]+','+rot[2][1]+',0,'+rot[0][2]+','+rot[1][2]+','+rot[2][2]+',0,'+tx+','+ty+','+tz+',1)';

    c.el.style.transform=css3d(rot,p[0],p[1],p[2]);
  }

  // Track top-face divs for image swapping
  var topFaces=[];

  for(var x=-1;x<=1;x++)for(var y=-1;y<=1;y++)for(var z=-1;z<=1;z++){
    if(x===0&&y===0&&z===0)continue;
    var el=document.createElement('div');
    el.style.cssText='position:absolute;width:'+S+'px;height:'+S+'px;transform-style:preserve-3d;';

    var isTopFace=(y===-1); // y=-1 is the top row

    // [transform, gradientKey or null]
    var faces=[
      ['translateZ('+half+'px)', z===1?'pz':null],
      ['rotateY(180deg) translateZ('+half+'px)', z===-1?'nz':null],
      ['rotateY(90deg) translateZ('+half+'px)', x===1?'px':null],
      ['rotateY(-90deg) translateZ('+half+'px)', x===-1?'nx':null],
      ['rotateX(-90deg) translateZ('+half+'px)', y===1?'py':null],
      ['rotateX(90deg) translateZ('+half+'px)', y===-1?'ny':null]
    ];

    faces.forEach(function(fd, fi){
      var f=document.createElement('div');
      var isTop=(fi===5 && isTopFace);
      var key=fd[1];
      var bg;

      if(isTop){
        // Image tile on top face
        var col=(x+1), row=(z+1);
        var bgPos=(col*50)+'% '+(row*50)+'%';
        f.style.cssText='position:absolute;width:'+S+'px;height:'+S+'px;backface-visibility:visible;transform:'+fd[0]+';background-size:300% 300%;background-position:'+bgPos+';background-image:url('+HERO_IMGS[0]+');border:1px solid rgba(0,200,255,.18);';
        f.setAttribute('data-col',col);
        f.setAttribute('data-row',row);
        topFaces.push(f);
      } else if(key){
        // Gradient face for 3D depth
        var g=FG[key];
        bg='linear-gradient(135deg,'+g[0]+' 0%,'+g[1]+' 50%,'+g[2]+' 100%)';
        f.style.cssText='position:absolute;width:'+S+'px;height:'+S+'px;backface-visibility:visible;transform:'+fd[0]+';background:'+bg+';border:1px solid rgba(0,200,255,.12);box-shadow:inset 0 0 8px rgba(0,0,0,.25);';
      } else {
        // Inner face (not visible)
        f.style.cssText='position:absolute;width:'+S+'px;height:'+S+'px;backface-visibility:visible;transform:'+fd[0]+';background:'+INNER+';border:1px solid rgba(0,200,255,.04);';
      }
      el.appendChild(f);
    });

    var c={el:el,gx:x,gy:y,gz:z,r:[[1,0,0],[0,1,0],[0,0,1]],origY:y};
    cubies.push(c);
    root.appendChild(el);
    upd(c);
  }

  // Function to update top face images
  function setTopImage(imgUrl){
    topFaces.forEach(function(f){
      f.style.backgroundImage='url('+imgUrl+')';
    });
  }

  // Cycle images
  var turnCount=0;

  var busy=false;
  function doTurn(){
    if(busy)return;
    busy=true;
    var ax=Math.floor(Math.random()*3);
    var layer=[-1,0,1][Math.floor(Math.random()*3)];
    var dir=Math.random()<.5?1:-1;
    var target=dir*Math.PI/2;
    var aff=cubies.filter(function(c){return(ax===0?c.gx:ax===1?c.gy:c.gz)===layer;});
    var dur=550,t0=performance.now();
    function tick(now){
      var t=Math.min((now-t0)/dur,1);
      t=t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
      var er=rm(ax,target*t);
      aff.forEach(function(c){upd(c,er);});
      if(t<1){requestAnimationFrame(tick);}
      else{
        var fr=rm(ax,target);
        aff.forEach(function(c){
          var np=rv(fr,[c.gx,c.gy,c.gz]);
          c.gx=Math.round(np[0]);c.gy=Math.round(np[1]);c.gz=Math.round(np[2]);
          c.r=m3(fr,c.r);upd(c);
        });
        busy=false;
        turnCount++;
        // Every 3 turns, cycle to next image
        if(turnCount%3===0){
          curImg=(curImg+1)%HERO_IMGS.length;
          setTopImage(HERO_IMGS[curImg]);
        }
      }
    }
    requestAnimationFrame(tick);
  }
  setTimeout(function(){doTurn();setInterval(doTurn,1600);},1200);
})();

// === Orbiting labels ===
(function(){
  var links=[document.getElementById('orb0'),document.getElementById('orb1'),document.getElementById('orb2'),document.getElementById('orb3')];
  var offsets=[0, Math.PI/2, Math.PI, 3*Math.PI/2];
  var speed=0.00012;
  var angle=0;
  var hub=document.querySelector('.hub');

  function getRadius(){
    var w=hub.offsetWidth/2, h=hub.offsetHeight/2;
    var r=Math.min(w,h)*0.78;
    var isMobile=window.innerWidth<=768;
    return isMobile ? Math.max(140, Math.min(200, r)) : Math.max(260, Math.min(420, r));
  }

  setTimeout(function(){
    links.forEach(function(l){l.classList.add('visible');});
  },800);

  var last=performance.now();
  function tick(now){
    var dt=now-last; last=now;
    angle+=speed*dt;
    var cx=hub.offsetWidth/2;
    var cy=hub.offsetHeight/2;
    var R=getRadius();

    for(var i=0;i<4;i++){
      var a=angle+offsets[i];
      var x=Math.cos(a)*R;
      var y=Math.sin(a)*R*0.5;
      links[i].style.transform='translate('+(cx+x)+'px,'+(cy+y)+'px) translate(-50%,-50%)';
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();

// === Animated Grid Background ===
(function(){
  var c=document.getElementById('gridCanvas');
  if(!c)return;
  var ctx=c.getContext('2d');
  var w,h;
  function resize(){
    w=c.width=window.innerWidth;
    h=c.height=window.innerHeight;
  }
  resize();
  window.addEventListener('resize',resize);

  var cols=Math.ceil(w/80)+2;
  var rows=Math.ceil(h/80)+2;
  var t=0;

  function draw(){
    t+=0.003;
    ctx.clearRect(0,0,w,h);
    
    // Vertical lines
    for(var i=0;i<cols;i++){
      var x=i*80;
      var wave=Math.sin(t+i*0.15)*8;
      var alpha=0.03+Math.sin(t*0.7+i*0.3)*0.015;
      ctx.beginPath();
      ctx.strokeStyle='rgba(0,180,230,'+alpha+')';
      ctx.lineWidth=0.5;
      for(var y=0;y<h;y+=4){
        var dx=wave*Math.sin(y*0.008+t*0.5);
        if(y===0)ctx.moveTo(x+dx,y);
        else ctx.lineTo(x+dx,y);
      }
      ctx.stroke();
    }
    
    // Horizontal lines
    for(var j=0;j<rows;j++){
      var y=j*80;
      var wave2=Math.sin(t*0.8+j*0.15)*8;
      var alpha2=0.03+Math.sin(t*0.5+j*0.3)*0.015;
      ctx.beginPath();
      ctx.strokeStyle='rgba(0,180,230,'+alpha2+')';
      ctx.lineWidth=0.5;
      for(var x=0;x<w;x+=4){
        var dy=wave2*Math.sin(x*0.008+t*0.5);
        if(x===0)ctx.moveTo(x,y+dy);
        else ctx.lineTo(x,y+dy);
      }
      ctx.stroke();
    }
    
    // Subtle glow at intersections
    for(var i=0;i<cols;i++){
      for(var j=0;j<rows;j++){
        var px=i*80+Math.sin(t+i*0.15)*8*Math.sin(j*80*0.008+t*0.5);
        var py=j*80+Math.sin(t*0.8+j*0.15)*8*Math.sin(i*80*0.008+t*0.5);
        var ga=0.04+Math.sin(t*1.2+i+j)*0.025;
        if(ga>0){
          ctx.beginPath();
          ctx.arc(px,py,1.5,0,6.28);
          ctx.fillStyle='rgba(0,200,255,'+ga+')';
          ctx.fill();
        }
      }
    }
    
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
